<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarangaySync Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <img src="../img/pamplonaLOGO.jpg" alt="Barangay Pamplona Tres Logo" class="logo">
            </div>
            
            <h2>LOGIN PAGE</h2>

            <form>
                <div class="input-group">
                    <label for="email">Email/Phone Number</label>
                    <input type="text" id="email" name="email" placeholder="Enter your email or phone">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password">
                </div>

                <div class="forgot-password">
                    <a href="#">Forget Password?</a>
                </div>

                <div class="button-group">
                    <div class="role-btn-container">
                        <!-- Resident Login -->
                        <a href="../resident page/dashboard.html" class="sign-in-btn" style="text-decoration: none; display: inline-block; text-align: center;">SIGN IN</a>
                        <span class="role-label">Consumer</span>
                    </div>

                    <div class="role-btn-container">
                        <!-- Admin Login -->
                        <a href="../admin/admin.html" class="sign-in-btn" style="text-decoration: none; display: inline-block; text-align: center;">SIGN IN</a>
                        <span class="role-label">Administrator</span>
                    </div>
                </div>

                <div class="create-account">
                    <!-- Relative link to registration in the same folder -->
                    <a href="registration.html">Create an Account</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
