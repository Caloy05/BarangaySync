<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarangaySync Registration</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <img src="../img/pamplonaLOGO.jpg" alt="BarangaySync Logo" class="logo">
            </div>
            
            <h2>REGISTRATION PAGE</h2>

            <form action="signin.html" method="GET">
                <div class="input-group">
                    <label for="fname">First Name</label>
                    <input type="text" id="fname" name="fname" required>
                </div>

                <div class="input-group">
                    <label for="lname">Last Name</label>
                    <input type="text" id="lname" name="lname" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="input-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" name="phone" required>
                </div>

                <div class="password-submit-group">
                    <div class="passwords-column">
                        <div class="input-group">
                            <label for="create-password">Create Password</label>
                            <input type="password" id="create-password" name="create-password" required>
                        </div>
                        <div class="input-group" style="margin-bottom: 0;">
                            <label for="confirm-password">Confirm Password</label>
                            <input type="password" id="confirm-password" name="confirm-password" required>
                        </div>
                    </div>
                    
                    <div class="submit-column">
                        <button type="submit" class="sign-up-btn">SIGN UP</button>
                    </div>
                </div>

                <p style="text-align: center; margin-top: 20px; font-size: 14px;">
                    Already have an account? <a href="signin.html">Sign In</a>
                </p>
            </form>
        </div>
    </div>
</body>
</html>
